apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-server
  labels:
    app: python-server
spec:
  ## Must match the label defined in service.yaml
  selector:
    matchLabels:
      app: python-server
  replicas: 2
  template:
    metadata:
      labels:
        app: python-server
    spec:
      ## Define the container image to be used
      containers:
        - name: python-server
          image: ericgpinto/simple-python-app:v5.4
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 1
            successThreshold: 1
          envFrom:
            - configMapRef:
                name: pythonserver-env
            - secretRef:
                name: pythonserver-secret
