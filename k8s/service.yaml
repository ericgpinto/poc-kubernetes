apiVersion: v1
kind: Service
metadata:
  name: python-service
spec:
  ## Match the label defined in deployment.yaml
  selector:
    app: python-server
  type: ClusterIP
  ports:
    - name: python-service
      ## Expose port 80 on the service and map it to port 8080 on the pod
      port: 80
      targetPort: 8080
      protocol: TCP
